name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...
